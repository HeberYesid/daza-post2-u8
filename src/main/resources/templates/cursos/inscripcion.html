<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inscripción</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f4f7fc;
      }
      .container {
        max-width: 560px;
        margin: 2rem auto;
        background: #fff;
        border-radius: 12px;
        padding: 1.2rem;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }
      label {
        display: block;
        margin-top: 0.8rem;
      }
      select {
        width: 100%;
        padding: 0.55rem;
        margin-top: 0.2rem;
        border: 1px solid #d9e0ea;
        border-radius: 8px;
      }
      button,
      .btn-sec {
        margin-top: 1rem;
        padding: 0.55rem 0.9rem;
        border-radius: 8px;
        border: 0;
        text-decoration: none;
        display: inline-block;
      }
      button {
        background: #0d6efd;
        color: #fff;
      }
      .btn-sec {
        background: #6c757d;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Inscribir estudiante en curso</h1>

      <form th:action="@{/cursos/inscripciones}" method="post">
        <label>Curso</label>
        <select name="cursoId" title="Curso" required>
          <option value="">Seleccione...</option>
          <option
            th:each="c : ${cursos}"
            th:value="${c.id}"
            th:text="${c.nombre + ' (' + c.creditos + ' cr.)'}"
          ></option>
        </select>

        <label>Estudiante</label>
        <select name="estudianteId" title="Estudiante" required>
          <option value="">Seleccione...</option>
          <option
            th:each="e : ${estudiantes}"
            th:value="${e.id}"
            th:text="${e.nombre + ' - ' + e.email}"
          ></option>
        </select>

        <button type="submit">Inscribir</button>
        <a class="btn-sec" th:href="@{/cursos}">Cancelar</a>
      </form>
    </div>
  </body>
</html>
