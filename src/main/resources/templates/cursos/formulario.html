<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nuevo curso</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f4f7fc;
      }
      .container {
        max-width: 560px;
        margin: 2rem auto;
        background: #fff;
        border-radius: 12px;
        padding: 1.2rem;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }
      label {
        display: block;
        margin-top: 0.8rem;
      }
      input {
        width: 100%;
        padding: 0.55rem;
        margin-top: 0.2rem;
        border: 1px solid #d9e0ea;
        border-radius: 8px;
      }
      .error {
        color: #b02a37;
        font-size: 0.9rem;
      }
      button,
      .btn-sec {
        margin-top: 1rem;
        padding: 0.55rem 0.9rem;
        border-radius: 8px;
        border: 0;
        text-decoration: none;
        display: inline-block;
      }
      button {
        background: #0d6efd;
        color: #fff;
      }
      .btn-sec {
        background: #6c757d;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Nuevo curso</h1>

      <form th:action="@{/cursos/guardar}" th:object="${curso}" method="post">
        <label>Nombre</label>
        <input
          type="text"
          th:field="*{nombre}"
          title="Nombre del curso"
          placeholder="Programación Web"
        />
        <div
          class="error"
          th:if="${#fields.hasErrors('nombre')}"
          th:errors="*{nombre}"
        ></div>

        <label>Créditos</label>
        <input
          type="number"
          min="1"
          th:field="*{creditos}"
          title="Créditos"
          placeholder="3"
        />
        <div
          class="error"
          th:if="${#fields.hasErrors('creditos')}"
          th:errors="*{creditos}"
        ></div>

        <button type="submit">Guardar</button>
        <a class="btn-sec" th:href="@{/cursos}">Cancelar</a>
      </form>
    </div>
  </body>
</html>
