<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f7fc; }
        .container { max-width: 580px; margin: 2rem auto; background: #fff; border-radius: 12px; padding: 1.2rem; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
        label { display: block; margin-top: .8rem; }
        input { width: 100%; padding: .55rem; margin-top: .2rem; border: 1px solid #d9e0ea; border-radius: 8px; }
        .error { color: #b02a37; font-size: .9rem; }
        button, .btn-sec { margin-top: 1rem; padding: .55rem .9rem; border-radius: 8px; border: 0; text-decoration: none; display: inline-block; }
        button { background: #0d6efd; color: #fff; }
        .btn-sec { background: #6c757d; color: #fff; }
    </style>
</head>
<body>
<div class="container">
    <h1 th:text="${estudiante.id == null} ? 'Nuevo estudiante' : 'Editar estudiante'"></h1>

    <form th:action="@{/estudiantes/guardar}" th:object="${estudiante}" method="post">
        <input type="hidden" th:field="*{id}" />

        <label>Nombre</label>
        <input type="text" th:field="*{nombre}" />
        <div class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>

        <label>Email</label>
        <input type="email" th:field="*{email}" />
        <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>

        <label>Carrera</label>
        <input type="text" th:field="*{carrera}" />
        <div class="error" th:if="${#fields.hasErrors('carrera')}" th:errors="*{carrera}"></div>

        <button type="submit">Guardar</button>
        <a class="btn-sec" th:href="@{/estudiantes}">Cancelar</a>
    </form>
</div>
</body>
</html>
